backend = "xrender";
vsync = false;

# Transparencia (sin blur, xrender no lo soporta)
inactive-opacity = 0.90;
active-opacity = 1.0;
frame-opacity = 1.0;

# Sombras
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.45;
shadow-offset-x = -12;
shadow-offset-y = -12;

# Esquinas redondeadas
corner-radius = 8;
