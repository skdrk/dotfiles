[colors]
background = #1a1b26
background-alt = #24283b
foreground = #c0caf5
blue = #7aa2f7
purple = #bb9af7
cyan = #7dcfff
green = #9ece6a
yellow = #e0af68
orange = #ff9e64
red = #f7768e
disabled = #565f89

[bar/main]
width = 100%
height = 30pt
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
padding-left = 1
padding-right = 1
module-margin = 1
separator = 
separator-foreground = ${colors.disabled}
font-0 = JetBrainsMono Nerd Font:size=11;3
modules-left = i3
modules-center = date
modules-right = memory cpu filesystem pulseaudio powermenu
cursor-click = pointer
enable-ipc = true

[module/i3]
type = internal/i3
format = <label-state>
index-sort = true
enable-scroll = true
label-focused = %name%
label-focused-background = ${colors.blue}
label-focused-foreground = ${colors.background}
label-focused-padding = 2
label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding = 2
label-visible = %name%
label-visible-background = ${colors.background-alt}
label-visible-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 1
date = %d/%m/%Y
time = %H:%M:%S
label =   %date%   %time%
label-foreground = ${colors.cyan}

[module/memory]
type = internal/memory
interval = 2
label =  %percentage_used%%
label-foreground = ${colors.green}

[module/cpu]
type = internal/cpu
interval = 2
label =  %percentage%%
label-foreground = ${colors.yellow}

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /
label-mounted =  %percentage_used%%
label-mounted-foreground = ${colors.purple}
label-unmounted =

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume =  %percentage%%
label-volume-foreground = ${colors.blue}
label-muted =  muted
label-muted-foreground = ${colors.disabled}

[module/powermenu]
type = custom/text
format =  
format-foreground = ${colors.red}
click-left = ~/.config/polybar/powermenu.sh

[settings]
screen-changed-reload = true
